<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>Predicts Dashboard — Locked</title>
<style>
  :root{--bg:#0d1117;--bg2:#161b22;--bg3:#1f2630;--line:#30363d;--txt:#e6edf3;--mut:#8b949e;--accent:#58a6ff;--bad:#f85149}
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;height:100%;background:var(--bg);color:var(--txt);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;font-size:14px}
  body{display:flex;align-items:center;justify-content:center;padding:20px}
  .gate{max-width:380px;width:100%;background:var(--bg2);border:1px solid var(--line);
        border-radius:12px;padding:28px 28px 24px;box-shadow:0 10px 40px rgba(0,0,0,.4)}
  .gate h1{margin:0 0 6px;font-size:18px;font-weight:600;letter-spacing:-.2px}
  .gate .sub{color:var(--mut);font-size:12px;margin-bottom:20px}
  .gate label{display:block;font-size:11px;color:var(--mut);text-transform:uppercase;
              letter-spacing:.5px;font-weight:600;margin-bottom:6px}
  .gate input[type=password]{width:100%;padding:10px 12px;background:var(--bg3);color:var(--txt);
    border:1px solid var(--line);border-radius:6px;font-size:14px;font-family:inherit;outline:none;
    transition:border-color .15s}
  .gate input[type=password]:focus{border-color:var(--accent)}
  .gate button{margin-top:14px;width:100%;padding:10px 14px;background:var(--accent);color:white;
    border:0;border-radius:6px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;
    transition:filter .15s}
  .gate button:hover{filter:brightness(1.1)}
  .gate button:disabled{opacity:.6;cursor:wait}
  .err{margin-top:10px;color:var(--bad);font-size:12px;min-height:1.2em}
  .note{margin-top:18px;padding-top:14px;border-top:1px solid var(--line);color:var(--mut);font-size:11px;line-height:1.5}
  .lock{font-size:24px;margin-bottom:8px;color:var(--accent)}
</style>
</head>
<body>
<div class="gate">
  <div class="lock">&#x1F512;</div>
  <h1>Predicts Merchandising Dashboard</h1>
  <div class="sub">Protected — enter the access password to continue.</div>
  <form id="f" autocomplete="off">
    <label for="p">Password</label>
    <input type="password" id="p" autofocus required>
    <button type="submit" id="b">Unlock</button>
    <div class="err" id="err"></div>
  </form>
  <div class="note">This dashboard contains internal Predicts merchandising data. Don't share the password or the link outside the team.</div>
</div>

const ITERS    = 250000;

const b64ToBytes = s => Uint8Array.from(atob(s), c=>c.charCodeAt(0));

async function unlock(password){
  const salt = b64ToBytes(SALT_B64);
  const iv   = b64ToBytes(IV_B64);
  const ct   = b64ToBytes(CT_B64);
  const enc  = new TextEncoder();
  const keyMaterial = await crypto.subtle.importKey(
    "raw", enc.encode(password), {name:"PBKDF2"}, false, ["deriveKey"]
  );
  const key = await crypto.subtle.deriveKey(
    {name:"PBKDF2", salt, iterations:ITERS, hash:"SHA-256"},
    keyMaterial, {name:"AES-GCM", length:256}, false, ["decrypt"]
  );
  const plainBuf = await crypto.subtle.decrypt({name:"AES-GCM", iv}, key, ct);
  return new TextDecoder().decode(plainBuf);
}

document.getElementById('f').addEventListener('submit', async (e)=>{
  e.preventDefault();
  const pw = document.getElementById('p').value;
  const btn = document.getElementById('b');
  const err = document.getElementById('err');
  err.textContent = '';
  btn.disabled = true; btn.textContent = 'Unlocking…';
  try{
    const html = await unlock(pw);
    document.open();
    document.write(html);
    document.close();
  } catch(ex){
    btn.disabled = false; btn.textContent = 'Unlock';
    err.textContent = 'Wrong password. Try again.';
    document.getElementById('p').select();
  }
});
</script>
